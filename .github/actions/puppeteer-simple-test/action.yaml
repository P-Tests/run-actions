name: 'Puppeteer Simple Test Runner'
description: 'Run Puppeteer tests without chunking'

inputs:
  provider:
    description: 'Provider to test'
    required: true
  suite:
    description: 'Test suite to run'
    required: false
    default: 'default'
  url:
    description: 'Stand URL to test'
    required: false
    default: ''
  url_release:
    description: 'Release environment URL'
    required: false
    default: ''
  url_hotfix:
    description: 'Hotfix environment URL'
    required: false
    default: ''
  url_develop:
    description: 'Develop environment URL'
    required: false
    default: ''
  launch_name:
    description: 'Report Portal launch name'
    required: false
    default: 'Github Action Tests'
  project_name:
    description: 'Report Portal project name'
    required: false
    default: 'docsserver'
  os_name:
    description: 'Operating system name (windows, linux, macos)'
    required: true
  read_pat:
    description: 'GitHub PAT for private repository access'
    required: true
  report_key:
    description: 'Report Portal API key'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout Dep.Tests repository
      uses: actions/checkout@v4
      with:
        repository: ONLYOFFICE-data/Dep.Tests
        path: Dep.Tests
        token: ${{ inputs.read_pat }}

    - name: Setup Git
      shell: bash
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git config --global url."https://${{ inputs.read_pat }}@github.com/".insteadOf "https://github.com/"

    - name: Init specific submodule
      shell: bash
      run: |
        cd Dep.Tests
        git submodule update --init --depth 1 puppeteer/files

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'

    - name: Install npm dependencies
      shell: bash
      working-directory: Dep.Tests/puppeteer/engine
      run: npm install

    - name: Cache Puppeteer browsers
      id: cache-puppeteer
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-chrome-${{ hashFiles('Dep.Tests/puppeteer/engine/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-puppeteer-chrome-

    - name: Install Chrome for Puppeteer
      if: steps.cache-puppeteer.outputs.cache-hit != 'true'
      shell: bash
      run: |
        cd Dep.Tests/puppeteer/engine
        npx puppeteer browsers install chrome

    - name: Determine config file
      shell: bash
      run: |
        if [[ "${{ inputs.os_name }}" == "windows" ]]; then
          echo "CONFIG_FILE=Dep.Tests/puppeteer/config_chrome_win.json" >> $GITHUB_ENV
        elif [[ "${{ inputs.os_name }}" == "linux" ]]; then
          echo "CONFIG_FILE=Dep.Tests/puppeteer/config_chrome_linux.json" >> $GITHUB_ENV
        elif [[ "${{ inputs.os_name }}" == "macos" ]]; then
          echo "CONFIG_FILE=Dep.Tests/puppeteer/config_chrome_mac.json" >> $GITHUB_ENV
        fi

    - name: Configure test URL
      if: inputs.url != ''
      shell: bash
      run: |
        URL_INPUT="${{ inputs.url }}"

        case "$URL_INPUT" in
          release) URL="${{ inputs.url_release }}" ;;
          hotfix) URL="${{ inputs.url_hotfix }}" ;;
          develop) URL="${{ inputs.url_develop }}" ;;
          *) URL="$URL_INPUT" ;;
        esac

        node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('${{ env.CONFIG_FILE }}', 'utf8'));
          config.testOptions.url = '$URL' + '${{ inputs.provider }}';
          config.puppeteerOptions.headless = true;
          fs.writeFileSync('${{ env.CONFIG_FILE }}', JSON.stringify(config, null, 2));
        "

    - name: Configure Report Portal
      shell: bash
      env:
        REPORT_API_KEY: ${{ inputs.report_key }}
      run: |
        node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('Dep.Tests/tools/report_portal/config.json', 'utf8'));
          config.api_key = process.env.REPORT_API_KEY;
          config.project_name = '${{ inputs.project_name }}';
          config.launch_name = '${{ inputs.launch_name }}';
          fs.writeFileSync('Dep.Tests/tools/report_portal/config.json', JSON.stringify(config, null, 2));
        "

    - name: Configure Chrome sandbox (Linux only)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        CHROME_DIR=$(find ~/.cache/puppeteer/chrome -name "linux-*" -type d 2>/dev/null | head -n 1)
        if [ -n "$CHROME_DIR" ]; then
          cd "$CHROME_DIR/chrome-linux64/"
          sudo chown root:root chrome_sandbox
          sudo chmod 4755 chrome_sandbox
          sudo cp -p chrome_sandbox /usr/local/sbin/chrome-devel-sandbox
          echo "CHROME_DEVEL_SANDBOX=/usr/local/sbin/chrome-devel-sandbox" >> $GITHUB_ENV
        fi

    - name: Run tests
      shell: bash
      working-directory: Dep.Tests/puppeteer/engine
      run: |
        python run.py \
          --suite ${{ inputs.suite }} \
          --disable_animation \
          --config_params puppeteerOptions.headless=true \
          --providers ${{ inputs.provider }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: out-${{ inputs.os_name }}-${{ inputs.provider }}
        path: Dep.Tests/puppeteer/out
        retention-days: 2
