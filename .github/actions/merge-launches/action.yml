name: 'Merge Report Portal Launches'
description: 'Merges multiple Report Portal launches into one'

inputs:
  os-name:
    description: 'Operating system name (windows, linux, macos)'
    required: true
  launch-uuids:
    description: 'JSON array of launch UUIDs to merge'
    required: true
  api-key:
    description: 'Report Portal API key'
    required: true
  project-name:
    description: 'Report Portal project name'
    required: true
  github-token:
    description: 'GitHub token for accessing private repository'
    required: true

outputs:
  rp_launch_url:
    description: 'ReportPortal merged launch URL'
    value: ${{ steps.merge.outputs.rp_url }}

runs:
  using: 'composite'
  steps:
    - name: Checkout Dep.Tests repository
      uses: actions/checkout@v4
      with:
        repository: ONLYOFFICE-data/Dep.Tests
        path: Dep.Tests
        token: ${{ inputs.github-token }}
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Configure and Merge Launches
      id: merge
      shell: bash
      working-directory: Dep.Tests/tools/report_portal
      run: |
        node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
          config.api_key = '${{ inputs.api-key }}';
          config.project_name = '${{ inputs.project-name }}';
          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        "

        UUIDS='${{ inputs.launch-uuids }}'

        if [ -z "$UUIDS" ] || [ "$UUIDS" = "[]" ] || [ "$UUIDS" = "null" ]; then
          echo "No UUIDs for ${{ inputs.os-name }}, skipping merge"
          echo "rp_url=" >> $GITHUB_OUTPUT
          exit 0
        fi

        if ! echo "$UUIDS" | jq empty 2>/dev/null; then
          echo "Invalid JSON format for ${{ inputs.os-name }} UUIDs"
          exit 1
        fi

        UUID_COUNT=$(echo "$UUIDS" | jq '. | length')

        if [ "$UUID_COUNT" -le 1 ]; then
          echo "Only $UUID_COUNT UUID(s) for ${{ inputs.os-name }}, merge not needed"
          echo "rp_url=" >> $GITHUB_OUTPUT
          exit 0
        fi

        UUID_LIST=$(echo "$UUIDS" | jq -r '.[]' | tr '\n' ' ')

        echo "Merging $UUID_COUNT launches for ${{ inputs.os-name }}"

        set +e
        python merge_launches.py \
          --launch-uuids $UUID_LIST \
          --name "Github Action All Tests" \
          --merge-type DEEP \
          --description " " 2>&1 | tee merge_output.log
        EXIT_CODE=$?
        set -e

        RP_URL=$(grep -oP 'RP_LAUNCH_URL=\K.*' merge_output.log 2>/dev/null | tail -n 1 || echo "")
        echo "rp_url=$RP_URL" >> $GITHUB_OUTPUT

        rm -f merge_output.log
        exit $EXIT_CODE
