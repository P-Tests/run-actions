  run-tests-macos:
    name: macOS - Chunk ${{ matrix.chunk }}
    needs: [prepare, run-tests-linux]
    if: "!cancelled()"
    runs-on: macos-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false
      max-parallel: 6
    env:
      OS_NAME: macos
      OS_CONFIG: config_chrome_mac.json

    steps:
      - name: Checkout Dep.Tests repository
        uses: actions/checkout@v4
        with:
          repository: ONLYOFFICE-data/Dep.Tests
          path: Dep.Tests
          token: ${{ secrets.READ_PAT }}
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
