          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT

          # Get merge job URL
          MERGE_URL=$(echo "$JOBS_JSON" | jq -r '.[] | select(.name == "Merge macOS Launches") | .url')
          echo "merge_url=$MERGE_URL" >> $GITHUB_OUTPUT
