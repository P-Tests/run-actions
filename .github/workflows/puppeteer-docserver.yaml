        uses: actions/upload-artifact@v4
        with:
          name: out-macos-example-chunk-${{ matrix.chunk }}
          path: Dep.Tests/puppeteer/out

  collect-launch-uuids:
    name: Collect Launch UUIDs
    needs: [prepare, run-tests-windows, run-tests-linux, run-tests-macos]
    runs-on: ubuntu-latest
    if: always()
    outputs:
      launch_uuids: ${{ steps.collect-uuids.outputs.launch_uuids }}

    steps:
      - name: Download all UUID artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: launch-uuid-*
          path: launch-uuids

      - name: Collect UUIDs
        id: collect-uuids
        shell: bash
        run: |
          UUIDS=()

          for file in launch-uuids/*/launch_uuid.txt; do
            if [ -f "$file" ]; then
              UUID=$(cat "$file" | tr -d '[:space:]')
              if [ -n "$UUID" ]; then
                UUIDS+=("$UUID")
              fi
            fi
          done

          UNIQUE_UUIDS=($(printf '%s\n' "${UUIDS[@]}" | sort -u))

          echo "Found ${#UNIQUE_UUIDS[@]} unique launch UUIDs:"
          printf '%s\n' "${UNIQUE_UUIDS[@]}"

          if [ ${#UNIQUE_UUIDS[@]} -eq 0 ]; then
            echo "launch_uuids=[]" >> $GITHUB_OUTPUT
          else
            UUIDS_JSON=$(printf '%s\n' "${UNIQUE_UUIDS[@]}" | jq -R . | jq -sc .)
            echo "Generated JSON: $UUIDS_JSON"
            {
              echo "launch_uuids<<EOF"
              echo "$UUIDS_JSON"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

  merge-launches:
    name: Merge Report Portal Launches
    needs: [collect-launch-uuids]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Checkout main repository Dep.Tests
        uses: actions/checkout@v4
        with:
          repository: ONLYOFFICE-data/Dep.Tests
          path: Dep.Tests
          token: ${{ secrets.READ_PAT }}

      - name: Configure Report Portal
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const filePath = 'Dep.Tests/tools/report_portal/config.json';
            const config = JSON.parse(fs.readFileSync(filePath, 'utf8'));

            config.api_key = 'test_9EE9Ay_ISY-jNRYHAJBplrYxFn6xmwklbOTrVpEAnU92z1sKchsPnDyzHvtz21Fz';
            config.project_name = 'coldwaveuwu_personal';

            fs.writeFileSync(filePath, JSON.stringify(config, null, 2));
          "

      - name: Merge Report Portal Launches
        shell: bash
        run: |
          cd Dep.Tests/tools/report_portal

          UUIDS='${{ needs.collect-launch-uuids.outputs.launch_uuids }}'

          echo "=== Debug Info ==="
          echo "Raw UUIDS value: '$UUIDS'"
          echo "UUIDS length: ${#UUIDS}"
          echo "=================="

          if [ "$UUIDS" = "[]" ] || [ -z "$UUIDS" ]; then
            echo "No launch UUIDs found to merge"
            exit 0
          fi

          if ! echo "$UUIDS" | jq empty 2>/dev/null; then
            echo "Error: Invalid JSON format in launch_uuids"
            echo "Received: $UUIDS"
            exit 1
          fi

          UUID_COUNT=$(echo "$UUIDS" | jq '. | length')
          echo "Found $UUID_COUNT UUIDs in JSON array"

          if [ "$UUID_COUNT" -eq 0 ]; then
            echo "No UUIDs to merge (empty array)"
            exit 0
          fi

          UUIDS_ARRAY=$(echo "$UUIDS" | jq -r '.[]')

          echo "Merging Report Portal launches..."
          echo "UUIDs to merge:"
          echo "$UUIDS_ARRAY"
          echo ""

          python merge_launches.py \
            --launch-uuids $UUIDS_ARRAY \
            --name "Merged - {system}" \
            --merge-type DEEP

          echo "Report Portal launches merged successfully"
