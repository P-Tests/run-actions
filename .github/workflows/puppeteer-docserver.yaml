name: Puppeteer DocServer test
run-name: Puppeteer DocServer test - ${{ github.event.inputs.url }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: Stand to test
        required: true
        default: release
        type: choice
        options:
        - release
        - hotfix
        - develop
      chunk_size:
        description: 'Number of tests per chunk'
        required: false
        default: '1000'
        type: string

jobs:
  prepare:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      num_chunks: ${{ steps.set-matrix.outputs.num_chunks }}
      chunk_size: ${{ steps.set-matrix.outputs.chunk_size }}

    steps:
      - name: Checkout Dep.Tests repository
        uses: actions/checkout@v4
        with:
          repository: ONLYOFFICE-data/Dep.Tests
          path: Dep.Tests
          token: ${{ secrets.READ_PAT }}

      - name: Setup Git credentials
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git config --global url."https://${{ secrets.READ_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Init puppeteer files submodule
        run: |
          cd Dep.Tests
          git submodule update --init --depth 1 puppeteer/files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install npm dependencies
        working-directory: Dep.Tests/puppeteer/engine
        run: npm ci --prefer-offline --no-audit

      - name: Count tests and generate matrix
        id: set-matrix
        working-directory: Dep.Tests/puppeteer/engine
        run: |
          CHUNK_SIZE="${{ github.event.inputs.chunk_size }}"

          OUTPUT=$(python run.py \
            --providers example \
            --count-tests \
            --chunk-size $CHUNK_SIZE)

          NUM_CHUNKS=$(echo "$OUTPUT" | grep "num_chunks=" | cut -d'=' -f2)
          MATRIX=$(echo "$OUTPUT" | grep "matrix=" | cut -d'=' -f2-)

          echo "num_chunks=$NUM_CHUNKS" >> $GITHUB_OUTPUT
          echo "chunk_size=$CHUNK_SIZE" >> $GITHUB_OUTPUT
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  run-tests:
    name: ${{ matrix.os.name }} - Chunk ${{ matrix.chunk }}
    needs: prepare
    runs-on: ${{ matrix.os.runner }}
    strategy:
      matrix:
        os:
          - name: windows
            runner: windows-latest
            config: config_chrome_win.json
          - name: linux
            runner: ubuntu-latest
            config: config_chrome_linux.json
          - name: macos
            runner: macos-latest
            config: config_chrome_mac.json
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false
      max-parallel: 6

    steps:
      - name: Checkout Dep.Tests repository
        uses: actions/checkout@v4
        with:
          repository: ONLYOFFICE-data/Dep.Tests
          path: Dep.Tests
          token: ${{ secrets.READ_PAT }}

      - name: Setup Git credentials
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git config --global url."https://${{ secrets.READ_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Init puppeteer files submodule
        run: |
          cd Dep.Tests
          git submodule update --init --depth 1 puppeteer/files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install npm dependencies
        working-directory: Dep.Tests/puppeteer/engine
        run: npm install

      - name: Cache Puppeteer browsers
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-chrome-${{ hashFiles('Dep.Tests/puppeteer/engine/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-chrome-

      - name: Install Chrome for Puppeteer
        if: steps.cache-puppeteer.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd Dep.Tests/puppeteer/engine
          npx puppeteer browsers install chrome

      - name: Configure test URL
        shell: bash
        run: |
          URL_INPUT="${{ github.event.inputs.url }}"

          case "$URL_INPUT" in
            release) URL="${{ secrets.URL_RELEASE }}" ;;
            hotfix) URL="${{ secrets.URL_HOTFIX }}" ;;
            develop) URL="${{ secrets.URL_DEVELOP }}" ;;
            *) URL="$URL_INPUT" ;;
          esac

          [[ "$URL" != */example ]] && URL="${URL}/example"

          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('Dep.Tests/puppeteer/${{ matrix.os.config }}', 'utf8'));
            config.testOptions.url = '$URL';
            config.puppeteerOptions.headless = true;
            fs.writeFileSync('Dep.Tests/puppeteer/${{ matrix.os.config }}', JSON.stringify(config, null, 2));
          "

      - name: Configure Report Portal
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('Dep.Tests/tools/report_portal/config.json', 'utf8'));
            config.api_key = 'test_dpj1-SyRRGWSd9Jqie_-DieY4PFerARKwrKlmjAaVgMsjBmmAOAsKo16dDrNb2q6';
            config.project_name = 'coldwaveuwu_personal';
            config.launch_name = 'GitHub Actions - docsserver - ${{ matrix.os.name }}';
            fs.writeFileSync('Dep.Tests/tools/report_portal/config.json', JSON.stringify(config, null, 2));
          "

      - name: Configure Chrome sandbox (Linux only)
        if: runner.os == 'Linux'
        run: |
          CHROME_DIR=$(find ~/.cache/puppeteer/chrome -name "linux-*" -type d 2>/dev/null | head -n 1)
          if [ -n "$CHROME_DIR" ]; then
            cd "$CHROME_DIR/chrome-linux64/"
            sudo chown root:root chrome_sandbox
            sudo chmod 4755 chrome_sandbox
            sudo cp -p chrome_sandbox /usr/local/sbin/chrome-devel-sandbox
            echo "CHROME_DEVEL_SANDBOX=/usr/local/sbin/chrome-devel-sandbox" >> $GITHUB_ENV
          fi

      - name: Run tests chunk ${{ matrix.chunk }}
        shell: bash
        working-directory: Dep.Tests/puppeteer/engine
        run: |
          OUTPUT=$(python run.py \
            --providers example \
            --chunk-id ${{ matrix.chunk }} \
            --chunk-size ${{ needs.prepare.outputs.chunk_size }} \
            --disable_animation \
            --config_params puppeteerOptions.headless=true \
            --connect_portal 2>&1)

          echo "$OUTPUT"

          UUID=$(echo "$OUTPUT" | grep -oP 'RP_LAUNCH_UUID=\K[^\s]+' | tail -n 1 || echo "")

          if [ -n "$UUID" ]; then
            echo "$UUID" > launch_uuid.txt
          else
            echo "Warning: No Launch UUID found"
          fi

      - name: Upload Launch UUID
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-uuid-${{ matrix.os.name }}-chunk-${{ matrix.chunk }}
          path: Dep.Tests/puppeteer/engine/launch_uuid.txt
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os.name }}-chunk-${{ matrix.chunk }}
          path: Dep.Tests/puppeteer/out
          retention-days: 2

  collect-uuids:
    name: Collect Launch UUIDs
    needs: [prepare, run-tests]
    runs-on: ubuntu-latest
    if: always()
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Download UUID artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: launch-uuid-*
          path: uuids

      - name: Collect UUIDs
        id: collect
        run: |
          UUIDS=()

          for file in uuids/*/launch_uuid.txt; do
            [ -f "$file" ] || continue
            UUID=$(tr -d '[:space:]' < "$file")
            [ -n "$UUID" ] && UUIDS+=("$UUID")
          done

          UNIQUE_UUIDS=($(printf '%s\n' "${UUIDS[@]}" | sort -u))

          if [ ${#UNIQUE_UUIDS[@]} -eq 0 ]; then
            echo "launch_uuids=[]" >> $GITHUB_OUTPUT
          else
            UUIDS_JSON=$(printf '%s\n' "${UNIQUE_UUIDS[@]}" | jq -R . | jq -sc .)
            {
              echo "launch_uuids<<EOF"
              echo "$UUIDS_JSON"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

  merge-launches:
    name: Merge Report Portal Launches
    needs: [collect-uuids]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout Dep.Tests repository
        uses: actions/checkout@v4
        with:
          repository: ONLYOFFICE-data/Dep.Tests
          path: Dep.Tests
          token: ${{ secrets.READ_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure and Merge Launches
        working-directory: Dep.Tests/tools/report_portal
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('config.json', 'utf8'));
            config.api_key = 'test_dpj1-SyRRGWSd9Jqie_-DieY4PFerARKwrKlmjAaVgMsjBmmAOAsKo16dDrNb2q6';
            config.project_name = 'coldwaveuwu_personal';
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          "

          UUIDS='${{ needs.collect-uuids.outputs.launch_uuids }}'

          if [ "$UUIDS" = "[]" ] || [ -z "$UUIDS" ]; then
            echo "No launches to merge"
            exit 0
          fi

          if ! echo "$UUIDS" | jq empty 2>/dev/null; then
            echo "Error: Invalid JSON format"
            exit 1
          fi

          UUID_COUNT=$(echo "$UUIDS" | jq '. | length')

          if [ "$UUID_COUNT" -eq 0 ]; then
            echo "Empty UUID list"
            exit 0
          fi

          python merge_launches.py \
            --launch-uuids $(echo "$UUIDS" | jq -r '.[]') \
            --name "Merged - docsserver - {system}" \
            --merge-type DEEP
