          # Build message
          MESSAGE=$(printf $'\uD83D\uDCCA *Linux Test Run Summary*\n\n*Workflow:* %s\n*Provider:* example\n*Stand:* %s\n*Status:* %s\n\n---\n\n*Chunk Jobs:*\n%s\n\n---\n\n[View Merge Job](%s)\n[View Full Workflow Run](%s)' \
            "${{ github.workflow }}" \
            "${{ github.event.inputs.url }}" \
            "${OVERALL_STATUS}" \
            "${CHUNKS_OUTPUT}" \
            "${{ steps.collect-chunks.outputs.merge_url }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")

          # Add ReportPortal URL if available
          if [[ -n "${{ needs.merge-launches-linux.outputs.rp_launch_url }}" ]]; then
            MESSAGE=$(printf "%s\n[View Report Portal](%s)" "${MESSAGE}" "${{ needs.merge-launches-linux.outputs.rp_launch_url }}")
          fi

          # Escape quotes for JSON
          MESSAGE=$(echo "$MESSAGE" | sed 's/"/\\"/g')

          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_TO }}\",
              \"text\": \"$MESSAGE\",
              \"parse_mode\": \"Markdown\",
              \"disable_notification\": true,
              \"disable_web_page_preview\": true
            }"

