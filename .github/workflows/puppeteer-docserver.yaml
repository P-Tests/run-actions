name: Puppeteer DocServer test
run-name: Puppeteer DocServer test - ${{ github.event.inputs.url }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: Stand to test
        required: true
        default: release
        type: choice
        options:
        - release
        - hotfix
        - develop
      os:
        description: 'Operating system'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - linux
          - macos
      test_path:
        description: 'Path to specific test file (optional)'
        required: false
        default: ''
        type: string
      chunk_size:
        description: 'Number of tests per chunk'
        required: false
        default: '100'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.url }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      num_chunks: ${{ steps.prepare.outputs.num_chunks }}
      chunk_size: ${{ steps.prepare.outputs.chunk_size }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare test matrix
        id: prepare
        uses: ./.github/actions/puppeteer-prepare
        with:
          provider: example
          chunk_size: ${{ github.event.inputs.chunk_size }}
          read_pat: ${{ secrets.READ_PAT }}
          test_path: ${{ inputs.test_path }}

  run-tests-windows:
    name: Windows - Chunk ${{ matrix.chunk }}
    needs: prepare
    if: "!cancelled() && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'windows')"
    runs-on: windows-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: windows
          os_config: config_chrome_win.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}
          test_path: ${{ inputs.test_path }}
          launch_name: "${{ inputs.test_path == '' && 'Github Action All Tests' || 'Github Action Target Tests' }}${{ needs.prepare.outputs.num_chunks > 1 && format(' - Chunk {0}', matrix.chunk) || '' }}"

  collect-uuids-windows:
    name: Collect Windows UUIDs
    needs: [prepare, run-tests-windows]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.prepare.outputs.num_chunks > 1 && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'windows')"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: windows
          provider: example

  merge-launches-windows:
    name: Merge Windows Launches
    needs: [prepare, collect-uuids-windows]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.prepare.outputs.num_chunks > 1 && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'windows')"
    outputs:
      rp_launch_url: ${{ steps.merge.outputs.rp_launch_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: windows
          launch-uuids: ${{ needs.collect-uuids-windows.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}
          launch-name: ${{ inputs.test_path == '' && 'Github Action All Tests' || 'Github Action Target Tests' }}

  run-tests-linux:
    name: Linux - Chunk ${{ matrix.chunk }}
    needs: [prepare]
    if: "!cancelled() && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'linux')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: linux
          os_config: config_chrome_linux.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}
          test_path: ${{ inputs.test_path }}
          launch_name: "${{ inputs.test_path == '' && 'Github Action All Tests' || 'Github Action Target Tests' }}${{ needs.prepare.outputs.num_chunks > 1 && format(' - Chunk {0}', matrix.chunk) || '' }}"

  collect-uuids-linux:
    name: Collect Linux UUIDs
    needs: [prepare, run-tests-linux]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.prepare.outputs.num_chunks > 1 && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'linux')"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: linux
          provider: example

  merge-launches-linux:
    name: Merge Linux Launches
    needs: [prepare, collect-uuids-linux]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.prepare.outputs.num_chunks > 1 && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'linux')"
    outputs:
      rp_launch_url: ${{ steps.merge.outputs.rp_launch_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: linux
          launch-uuids: ${{ needs.collect-uuids-linux.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}
          launch-name: ${{ inputs.test_path == '' && 'Github Action All Tests' || 'Github Action Target Tests' }}

  run-tests-macos:
    name: macOS - Chunk ${{ matrix.chunk }}
    needs: [prepare]
    if: "!cancelled() && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'macos')"
    runs-on: macos-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: macos
          os_config: config_chrome_mac.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}
          test_path: ${{ inputs.test_path }}
          launch_name: "${{ inputs.test_path == '' && 'Github Action All Tests' || 'Github Action Target Tests' }}${{ needs.prepare.outputs.num_chunks > 1 && format(' - Chunk {0}', matrix.chunk) || '' }}"

  collect-uuids-macos:
    name: Collect macOS UUIDs
    needs: [prepare, run-tests-macos]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.prepare.outputs.num_chunks > 1 && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'macos')"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: macos
          provider: example

  merge-launches-macos:
    name: Merge macOS Launches
    needs: [prepare, collect-uuids-macos]
    runs-on: ubuntu-latest
    if: "!cancelled() && needs.prepare.outputs.num_chunks > 1 && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'macos')"
    outputs:
      rp_launch_url: ${{ steps.merge.outputs.rp_launch_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: macos
          launch-uuids: ${{ needs.collect-uuids-macos.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}
          launch-name: ${{ inputs.test_path == '' && 'Github Action All Tests' || 'Github Action Target Tests' }}

  final-summary-windows:
    name: Windows Test Summary
    needs: [prepare, run-tests-windows, merge-launches-windows]
    runs-on: ubuntu-latest
    if: "!cancelled() && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'windows')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download URL artifact (single chunk)
        if: needs.prepare.outputs.num_chunks == '1'
        uses: actions/download-artifact@v4
        with:
          pattern: launch-url-example-windows-chunk-*
          path: url-artifacts

      - name: Get RP URL
        id: get-rp-url
        shell: bash
        run: |
          if [ "${{ needs.prepare.outputs.num_chunks }}" == "1" ]; then
            URL=$(cat url-artifacts/launch-url-example-windows-chunk-*/launch_url.txt 2>/dev/null | head -n 1 | tr -d '[:space:]' || echo "")
            echo "rp_url=$URL" >> $GITHUB_OUTPUT
          else
            echo "rp_url=${{ needs.merge-launches-windows.outputs.rp_launch_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Collect Windows chunk jobs info
        id: collect-chunks
        shell: bash
        run: |
          JOBS_JSON=$(gh run view ${{ github.run_id }} --json jobs | jq '.jobs')

          CHUNKS=$(echo "$JOBS_JSON" | jq -r '[.[] | select(.name | startswith("Windows - Chunk"))] | map({name: .name, status: .status, conclusion: .conclusion, id: .databaseId, url: .url}) | @json')
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT

          MERGE_URL=$(echo "$JOBS_JSON" | jq -r '.[] | select(.name == "Merge Windows Launches") | .url')
          echo "merge_url=$MERGE_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.READ_PAT }}

      - name: Send comprehensive Telegram notification
        if: always()
        shell: bash
        run: |
          format_chunks() {
            local chunks_json="$1"

            if [[ "$chunks_json" == "[]" || -z "$chunks_json" ]]; then
              echo "  No chunks found"
              return
            fi

            echo "$chunks_json" | jq -r 'sort_by(.name) | .[] |
              if .conclusion == "success" then "  \u2705 "
              elif .conclusion == "failure" then "  \u274C "
              elif .conclusion == "cancelled" then "  \u1F6AB "
              elif .conclusion == "skipped" then "  \u23ED\uFE0F "
              else "  \u2753 " end +
              "[" + .name + "](" + .url + ")"'
          }

          CHUNKS_OUTPUT=$(format_chunks '${{ steps.collect-chunks.outputs.chunks }}')

          FAILED_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "failure")] | length')
          CANCELLED_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "cancelled")] | length')
          SUCCESS_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "success")] | length')
          TOTAL_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq 'length')

          if [[ "$FAILED_COUNT" -gt 0 ]]; then
            OVERALL_STATUS="\u274C Chunks failed (${SUCCESS_COUNT}/${TOTAL_COUNT} passed)"
          elif [[ "$CANCELLED_COUNT" -gt 0 ]]; then
            OVERALL_STATUS="\u1F6AB Some chunks cancelled (${SUCCESS_COUNT}/${TOTAL_COUNT} passed)"
          elif [[ "$SUCCESS_COUNT" -eq "$TOTAL_COUNT" ]] && [[ "$TOTAL_COUNT" -gt 0 ]]; then
            OVERALL_STATUS="\u2705 All chunks passed (${TOTAL_COUNT}/${TOTAL_COUNT})"
          else
            OVERALL_STATUS="\u2753 Chunks status unknown"
          fi

          MESSAGE="${MESSAGE}\n*Workflow:* ${{ github.workflow }}"
          MESSAGE="${MESSAGE}\n*Provider:* example"
          MESSAGE="${MESSAGE}\n*Stand:* ${{ github.event.inputs.url }}"
          MESSAGE="${MESSAGE}\n*Status:* ${OVERALL_STATUS}"
          MESSAGE="${MESSAGE}\n*Chunk Jobs:*"
          MESSAGE="${MESSAGE}\n${CHUNKS_OUTPUT}"
          MESSAGE="${MESSAGE}\n"

          if [[ "${{ needs.prepare.outputs.num_chunks }}" -gt 1 ]]; then
            MESSAGE="${MESSAGE}\n[View Merge Job](${{ steps.collect-chunks.outputs.merge_url }})"
          fi

          MESSAGE="${MESSAGE}\n[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          if [[ -n "${{ steps.get-rp-url.outputs.rp_url }}" ]]; then
            MESSAGE="${MESSAGE}\n[View Report Portal](${{ steps.get-rp-url.outputs.rp_url }})"
          fi

          MESSAGE=$(echo "$MESSAGE" | sed 's/"/\\"/g')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_TO }}\",
              \"text\": \"$MESSAGE\",
              \"parse_mode\": \"Markdown\",
              \"disable_notification\": true,
              \"disable_web_page_preview\": true
            }"

  final-summary-linux:
    name: Linux Test Summary
    needs: [prepare, run-tests-linux, merge-launches-linux]
    runs-on: ubuntu-latest
    if: "!cancelled() && (inputs.os == '' || inputs.os == 'all' || inputs.os == 'linux')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download URL artifact (single chunk)
