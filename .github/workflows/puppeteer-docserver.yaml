          CHUNKS=$(echo "$JOBS_JSON" | jq -r '[.[] | select(.name | startswith("Linux - Chunk"))] | map({name: .name, status: .status, conclusion: .conclusion, id: .databaseId, url: .url}) | @json')
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT

          MERGE_URL=$(echo "$JOBS_JSON" | jq -r '.[] | select(.name == "Merge Linux Launches") | .url')
          echo "merge_url=$MERGE_URL" >> $GITHUB_OUTPUT
