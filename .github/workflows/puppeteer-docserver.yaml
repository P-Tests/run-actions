name: Puppeteer DocServer test
run-name: Puppeteer DocServer test - ${{ github.event.inputs.url }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: Stand to test
        required: true
        default: release
        type: choice
        options:
        - release
        - hotfix
        - develop
      chunk_size:
        description: 'Number of tests per chunk'
        required: false
        default: '500'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.url }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      num_chunks: ${{ steps.prepare.outputs.num_chunks }}
      chunk_size: ${{ steps.prepare.outputs.chunk_size }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare test matrix
        id: prepare
        uses: ./.github/actions/puppeteer-prepare
        with:
          provider: example
          chunk_size: ${{ github.event.inputs.chunk_size }}
          read_pat: ${{ secrets.READ_PAT }}

  run-tests-windows:
    name: Windows - Chunk ${{ matrix.chunk }}
    needs: prepare
    if: "!cancelled()"
    runs-on: windows-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: windows
          os_config: config_chrome_win.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}

  collect-uuids-windows:
    name: Collect Windows UUIDs
    needs: [prepare, run-tests-windows]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: windows

  merge-launches-windows:
    name: Merge Windows Launches
    needs: [run-tests-windows, collect-uuids-windows]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      rp_launch_url: ${{ steps.merge.outputs.rp_launch_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: windows
          launch-uuids: ${{ needs.collect-uuids-windows.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}

      - name: Get Job ID
        if: always()
        id: job-id
        shell: bash
        run: |
            JOB_NAME="Merge Windows Launches"
            JOB_ID=$(gh run view ${{ github.run_id }} --json jobs | jq -r --arg name "$JOB_NAME" '.jobs[] | select(.name == $name and .status != "queued") | .databaseId' | head -1)
            echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
        env:
            GITHUB_TOKEN: ${{ github.token }}

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          telegram_token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram_to: ${{ secrets.TELEGRAM_TO }}
          os_name: windows
          provider: example
          job_status: ${{ needs.run-tests-windows.result == 'failure' && 'failure' || job.status }}
          job_id: ${{ steps.job-id.outputs.job-id }}
          rp_url: ${{ steps.merge.outputs.rp_launch_url }}

  run-tests-linux:
    name: Linux - Chunk ${{ matrix.chunk }}
    needs: [prepare]
    if: "!cancelled()"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: linux
          os_config: config_chrome_linux.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}

  collect-uuids-linux:
    name: Collect Linux UUIDs
    needs: [prepare, run-tests-linux]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: linux

  merge-launches-linux:
    name: Merge Linux Launches
    needs: [run-tests-linux, collect-uuids-linux]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      rp_launch_url: ${{ steps.merge.outputs.rp_launch_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: linux
          launch-uuids: ${{ needs.collect-uuids-linux.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}

      - name: Get Job ID
        if: always()
        id: job-id
        shell: bash
        run: |
            JOB_NAME="Merge Linux Launches"
            JOB_ID=$(gh run view ${{ github.run_id }} --json jobs | jq -r --arg name "$JOB_NAME" '.jobs[] | select(.name == $name and .status != "queued") | .databaseId' | head -1)
            echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
        env:
            GITHUB_TOKEN: ${{ github.token }}

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          telegram_token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram_to: ${{ secrets.TELEGRAM_TO }}
          os_name: linux
          provider: example
          job_status: ${{ needs.run-tests-linux.result == 'failure' && 'failure' || job.status }}
          job_id: ${{ steps.job-id.outputs.job-id }}
          rp_url: ${{ steps.merge.outputs.rp_launch_url }}

  run-tests-macos:
    name: macOS - Chunk ${{ matrix.chunk }}
    needs: [prepare]
    if: "!cancelled()"
    runs-on: macos-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: macos
          os_config: config_chrome_mac.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}

  collect-uuids-macos:
    name: Collect macOS UUIDs
    needs: [prepare, run-tests-macos]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: macos

  merge-launches-macos:
    name: Merge macOS Launches
    needs: [run-tests-macos, collect-uuids-macos]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      rp_launch_url: ${{ steps.merge.outputs.rp_launch_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: macos
          launch-uuids: ${{ needs.collect-uuids-macos.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}

      - name: Get Job ID
        if: always()
        id: job-id
        shell: bash
        run: |
            JOB_NAME="Merge macOS Launches"
            JOB_ID=$(gh run view ${{ github.run_id }} --json jobs | jq -r --arg name "$JOB_NAME" '.jobs[] | select(.name == $name and .status != "queued") | .databaseId' | head -1)
            echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
        env:
            GITHUB_TOKEN: ${{ github.token }}

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          telegram_token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram_to: ${{ secrets.TELEGRAM_TO }}
          os_name: macos
          provider: example
          job_status: ${{ needs.run-tests-macos.result == 'failure' && 'failure' || job.status }}
          job_id: ${{ steps.job-id.outputs.job-id }}
          rp_url: ${{ steps.merge.outputs.rp_launch_url }}

  final-summary-windows:
    name: Windows Test Summary
    needs: [run-tests-windows, merge-launches-windows]
    runs-on: ubuntu-latest
    if: "!cancelled()"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect Windows chunk jobs info
        id: collect-chunks
        shell: bash
        run: |
          # Get all jobs for this workflow run
          JOBS_JSON=$(gh run view ${{ github.run_id }} --json jobs | jq '.jobs')

          # Collect Windows chunk jobs
          CHUNKS=$(echo "$JOBS_JSON" | jq -r '[.[] | select(.name | startswith("Windows - Chunk"))] | map({name: .name, status: .status, conclusion: .conclusion, id: .databaseId, url: .url}) | @json')
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT

          # Get merge job URL
          MERGE_URL=$(echo "$JOBS_JSON" | jq -r '.[] | select(.name == "Merge Windows Launches") | .url')
          echo "merge_url=$MERGE_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.READ_PAT }}

      - name: Send comprehensive Telegram notification
        if: always()
        shell: bash
        run: |
          # Function to format chunk jobs
          format_chunks() {
            local chunks_json="$1"

            if [[ "$chunks_json" == "[]" || -z "$chunks_json" ]]; then
              echo "  No chunks found"
              return
            fi

            echo "$chunks_json" | jq -r '.[] |
              if .conclusion == "success" then "  \u2705 "
              elif .conclusion == "failure" then "  \u274C "
              elif .conclusion == "cancelled" then "  \u1F6AB "
              elif .conclusion == "skipped" then "  \u23ED\uFE0F "
              else "  \u2753 " end +
              "[" + .name + "](" + .url + ")"'
          }

          CHUNKS_OUTPUT=$(format_chunks '${{ steps.collect-chunks.outputs.chunks }}')

          # Determine overall status by checking chunk conclusions
          FAILED_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "failure")] | length')
          CANCELLED_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "cancelled")] | length')
          SUCCESS_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "success")] | length')
          TOTAL_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq 'length')

          if [[ "$FAILED_COUNT" -gt 0 ]]; then
            OVERALL_STATUS=$'\u274C Tests failed ('$SUCCESS_COUNT'/'$TOTAL_COUNT' passed)'
          elif [[ "$CANCELLED_COUNT" -gt 0 ]]; then
            OVERALL_STATUS=$'\u1F6AB Some tests cancelled ('$SUCCESS_COUNT'/'$TOTAL_COUNT' passed)'
          elif [[ "$SUCCESS_COUNT" -eq "$TOTAL_COUNT" ]] && [[ "$TOTAL_COUNT" -gt 0 ]]; then
            OVERALL_STATUS=$'\u2705 All tests passed ('$TOTAL_COUNT'/'$TOTAL_COUNT')'
          else
            OVERALL_STATUS=$'\u2753 Tests status unknown'
          fi

          # Build message
          MESSAGE=$(printf $'\uD83D\uDCCA *Windows Test Run Summary*\n\n*Workflow:* %s\n*Provider:* example\n*Stand:* %s\n*Status:* %s\n\n---\n\n*Chunk Jobs:*\n%s\n\n---\n\n[View Merge Job](%s)\n[View Full Workflow Run](%s)' \
            "${{ github.workflow }}" \
            "${{ github.event.inputs.url }}" \
            "${OVERALL_STATUS}" \
            "${CHUNKS_OUTPUT}" \
            "${{ steps.collect-chunks.outputs.merge_url }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")

          # Add ReportPortal URL if available
          if [[ -n "${{ needs.merge-launches-windows.outputs.rp_launch_url }}" ]]; then
            MESSAGE=$(printf "%s\n[View Report Portal](%s)" "${MESSAGE}" "${{ needs.merge-launches-windows.outputs.rp_launch_url }}")
          fi

          # Escape quotes for JSON
          MESSAGE=$(echo "$MESSAGE" | sed 's/"/\\"/g')

          # Send to Telegram
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_TO }}\",
              \"text\": \"$MESSAGE\",
              \"parse_mode\": \"Markdown\",
              \"disable_notification\": true,
              \"disable_web_page_preview\": true
            }"

  final-summary-linux:
    name: Linux Test Summary
    needs: [run-tests-linux, merge-launches-linux]
    runs-on: ubuntu-latest
    if: "!cancelled()"

    steps:
      - name: Checkout repository
