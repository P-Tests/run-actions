name: Puppeteer DocServer test
run-name: Puppeteer DocServer test - ${{ github.event.inputs.url }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: Stand to test
        required: true
        default: release
        type: choice
        options:
        - release
        - hotfix
        - develop
      chunk_size:
        description: 'Number of tests per chunk'
        required: false
        default: '500'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.url }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      num_chunks: ${{ steps.prepare.outputs.num_chunks }}
      chunk_size: ${{ steps.prepare.outputs.chunk_size }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare test matrix
        id: prepare
        uses: ./.github/actions/puppeteer-prepare
        with:
          provider: example
          chunk_size: ${{ github.event.inputs.chunk_size }}
          read_pat: ${{ secrets.READ_PAT }}

  run-tests-windows:
    name: Windows - Chunk ${{ matrix.chunk }}
    needs: prepare
    if: "!cancelled()"
    runs-on: windows-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: windows
          os_config: config_chrome_win.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}

  collect-uuids-windows:
    name: Collect Windows UUIDs
    needs: [prepare, run-tests-windows]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: windows

  merge-launches-windows:
    name: Merge Windows Launches
    needs: [run-tests-windows, collect-uuids-windows]
    runs-on: ubuntu-latest
    if: "!cancelled()"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: windows
          launch-uuids: ${{ needs.collect-uuids-windows.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}

      - name: Get Job ID
        if: always()
        id: job-id
        shell: bash
        run: |
            JOB_NAME="Merge Windows Launches"
            JOB_ID=$(gh run view ${{ github.run_id }} --json jobs | jq -r --arg name "$JOB_NAME" '.jobs[] | select(.name == $name and .status != "queued") | .databaseId' | head -1)
            echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
        env:
            GITHUB_TOKEN: ${{ github.token }}

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          telegram_token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram_to: ${{ secrets.TELEGRAM_TO }}
          os_name: windows
          provider: example
          job_status: ${{ needs.run-tests-windows.result == 'failure' && 'failure' || job.status }}
          job_id: ${{ steps.job-id.outputs.job-id }}
          rp_url: ${{ steps.merge.outputs.rp_launch_url }}

  run-tests-linux:
    name: Linux - Chunk ${{ matrix.chunk }}
    needs: [prepare]
    if: "!cancelled()"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: linux
          os_config: config_chrome_linux.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}

  collect-uuids-linux:
    name: Collect Linux UUIDs
    needs: [prepare, run-tests-linux]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: linux

  merge-launches-linux:
    name: Merge Linux Launches
    needs: [run-tests-linux, collect-uuids-linux]
    runs-on: ubuntu-latest
    if: "!cancelled()"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: linux
          launch-uuids: ${{ needs.collect-uuids-linux.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}

      - name: Get Job ID
        if: always()
        id: job-id
        shell: bash
        run: |
            JOB_NAME="Merge Linux Launches"
            JOB_ID=$(gh run view ${{ github.run_id }} --json jobs | jq -r --arg name "$JOB_NAME" '.jobs[] | select(.name == $name and .status != "queued") | .databaseId' | head -1)
            echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
        env:
            GITHUB_TOKEN: ${{ github.token }}

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          telegram_token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram_to: ${{ secrets.TELEGRAM_TO }}
          os_name: linux
          provider: example
          job_status: ${{ needs.run-tests-linux.result == 'failure' && 'failure' || job.status }}
          job_id: ${{ steps.job-id.outputs.job-id }}
          rp_url: ${{ steps.merge.outputs.rp_launch_url }}

  run-tests-macos:
    name: macOS - Chunk ${{ matrix.chunk }}
    needs: [prepare]
    if: "!cancelled()"
    runs-on: macos-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.matrix).chunk }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: example
          chunk_id: ${{ matrix.chunk }}
          chunk_size: ${{ needs.prepare.outputs.chunk_size }}
          os_name: macos
          os_config: config_chrome_mac.json
          url: ${{ github.event.inputs.url }}
          url_release: ${{ secrets.URL_RELEASE }}
          url_hotfix: ${{ secrets.URL_HOTFIX }}
          url_develop: ${{ secrets.URL_DEVELOP }}
          project_name: docsserver
          read_pat: ${{ secrets.READ_PAT }}
          report_key: ${{ secrets.REPORT_KEY }}

  collect-uuids-macos:
    name: Collect macOS UUIDs
    needs: [prepare, run-tests-macos]
    runs-on: ubuntu-latest
    if: "!cancelled()"
    outputs:
      launch_uuids: ${{ steps.collect.outputs.launch_uuids }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        uses: ./.github/actions/collect-uuids
        with:
          os-name: macos

  merge-launches-macos:
    name: Merge macOS Launches
    needs: [run-tests-macos, collect-uuids-macos]
    runs-on: ubuntu-latest
    if: "!cancelled()"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge Launches
        id: merge
        uses: ./.github/actions/merge-launches
        with:
          os-name: macos
          launch-uuids: ${{ needs.collect-uuids-macos.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver
          github-token: ${{ secrets.READ_PAT }}

      - name: Get Job ID
        if: always()
        id: job-id
        shell: bash
        run: |
            JOB_NAME="Merge macOS Launches"
            JOB_ID=$(gh run view ${{ github.run_id }} --json jobs | jq -r --arg name "$JOB_NAME" '.jobs[] | select(.name == $name and .status != "queued") | .databaseId' | head -1)
            echo "job-id=$JOB_ID" >> $GITHUB_OUTPUT
        env:
            GITHUB_TOKEN: ${{ github.token }}

      - name: Send Telegram notification
        if: always()
        uses: ./.github/actions/telegram-notify
        with:
          telegram_token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram_to: ${{ secrets.TELEGRAM_TO }}
          os_name: macos
          provider: example
          job_status: ${{ needs.run-tests-macos.result == 'failure' && 'failure' || job.status }}
          job_id: ${{ steps.job-id.outputs.job-id }}
          rp_url: ${{ steps.merge.outputs.rp_launch_url }}
