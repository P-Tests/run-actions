          fi

      - name: Collect chunk jobs info
        id: collect-chunks
        if: always()
        shell: bash
        run: |
          JOBS_JSON=$(gh run view ${{ github.run_id }} --json jobs | jq '.jobs')
          CHUNKS=$(echo "$JOBS_JSON" | jq -r '[.[] | select(.name | startswith("DocSpace US - ${{ matrix.os.name }}"))] | map({name: .name, status: .status, conclusion: .conclusion, id: .databaseId, url: .url}) | @json')
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT
        env:
