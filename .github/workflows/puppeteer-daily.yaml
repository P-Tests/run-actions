    needs: [setup, prepare-ocis, run-ocis]
    if: "!cancelled()"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: ${{ fromJson(needs.setup.outputs.matrix).os }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect UUIDs
        id: collect
        if: needs.prepare-ocis.outputs.num_chunks > 1
        uses: ./.github/actions/collect-uuids
        with:
          os-name: ${{ matrix.os.name }}
          provider: ocis

      - name: Merge Launches
        id: merge
        if: needs.prepare-ocis.outputs.num_chunks > 1
        uses: ./.github/actions/merge-launches
        with:
          os-name: ${{ matrix.os.name }}
          launch-uuids: ${{ steps.collect.outputs.launch_uuids }}
          api-key: ${{ secrets.REPORT_KEY }}
          project-name: docsserver-daily
          github-token: ${{ secrets.READ_PAT }}
          launch-name: Daily Tests

      - name: Download URL artifact (single chunk)
        if: needs.prepare-ocis.outputs.num_chunks == '1'
        uses: actions/download-artifact@v4
        with:
          pattern: launch-url-ocis-${{ matrix.os.name }}-chunk-*
          path: url-artifacts

      - name: Get RP URL
        id: get-rp-url
        shell: bash
        run: |
          if [ "${{ needs.prepare-ocis.outputs.num_chunks }}" == "1" ]; then
            URL=$(cat url-artifacts/launch-url-ocis-${{ matrix.os.name }}-chunk-*/launch_url.txt 2>/dev/null | head -n 1 | tr -d '[:space:]' || echo "")
            echo "rp_url=$URL" >> $GITHUB_OUTPUT
          else
            echo "rp_url=${{ steps.merge.outputs.rp_launch_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Collect chunk jobs info
        id: collect-chunks
        if: always()
        shell: bash
        run: |
          JOBS_JSON=$(gh run view ${{ github.run_id }} --json jobs | jq '.jobs')
          CHUNKS=$(echo "$JOBS_JSON" | jq -r '[.[] | select(.name | startswith("OCIS - ${{ matrix.os.name }}"))] | map({name: .name, status: .status, conclusion: .conclusion, id: .databaseId, url: .url}) | @json')
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.READ_PAT }}

      - name: Send Telegram notification
        if: always()
        shell: bash
        run: |
          format_chunks() {
            local chunks_json="$1"
            if [[ "$chunks_json" == "[]" || -z "$chunks_json" ]]; then
              echo "  No chunks found"
              return
            fi
            echo "$chunks_json" | jq -r 'sort_by(.name) | .[] |
              if .conclusion == "success" then "  \u2705 "
              elif .conclusion == "failure" then "  \u274C "
              elif .conclusion == "cancelled" then "  \u26D4 "
              else "  \u2753 " end +
              "[" + .name + "](" + .url + ")"'
          }
          CHUNKS_OUTPUT=$(format_chunks '${{ steps.collect-chunks.outputs.chunks }}')
          FAILED_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "failure")] | length')
          CANCELLED_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "cancelled")] | length')
          SUCCESS_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq '[.[] | select(.conclusion == "success")] | length')
          TOTAL_COUNT=$(echo '${{ steps.collect-chunks.outputs.chunks }}' | jq 'length')
          if [[ "$FAILED_COUNT" -gt 0 ]]; then
            OVERALL_STATUS="\u274C Chunks failed (${SUCCESS_COUNT}/${TOTAL_COUNT} passed)"
          elif [[ "$CANCELLED_COUNT" -gt 0 ]]; then
            OVERALL_STATUS="\u26D4 Some chunks cancelled (${SUCCESS_COUNT}/${TOTAL_COUNT} passed)"
          elif [[ "$SUCCESS_COUNT" -eq "$TOTAL_COUNT" ]] && [[ "$TOTAL_COUNT" -gt 0 ]]; then
            OVERALL_STATUS="\u2705 All chunks passed (${TOTAL_COUNT}/${TOTAL_COUNT})"
          else
            OVERALL_STATUS="\u2753 Chunks status unknown"
          fi
          MESSAGE="\n*Workflow:* ${{ github.workflow }}\n*Provider:* ocis\n*OS:* ${{ matrix.os.name }}\n*Status:* ${OVERALL_STATUS}"
          MESSAGE="${MESSAGE}\n*Chunk Jobs:*"
          MESSAGE="${MESSAGE}\n${CHUNKS_OUTPUT}"
          MESSAGE="${MESSAGE}\n[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          if [[ -n "${{ steps.get-rp-url.outputs.rp_url }}" ]]; then MESSAGE="${MESSAGE}\n[View Report Portal](${{ steps.get-rp-url.outputs.rp_url }})"; fi
          MESSAGE=$(echo "$MESSAGE" | sed 's/"/\\"/g')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.TELEGRAM_TO }}\",\"text\":\"$MESSAGE\",\"parse_mode\":\"Markdown\",\"disable_notification\":true,\"disable_web_page_preview\":true}"
        env:
          GITHUB_TOKEN: ${{ secrets.READ_PAT }}
