      num_chunks: ${{ steps.prepare.outputs.num_chunks }}
      chunk_size: ${{ steps.prepare.outputs.chunk_size }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Prepare test matrix
        id: prepare
        uses: ./.github/actions/puppeteer-prepare
        with:
          provider: wopi
          suite: ${{ inputs.test_path == '' && 'daily' || '' }}
          chunk_size: '500'
          read_pat: ${{ secrets.READ_PAT }}
          test_path: ${{ inputs.test_path }}

  run-wopi:
    name: WOPI - ${{ matrix.os.name }} - Chunk ${{ matrix.chunk }}
    needs: [setup, prepare-wopi]
    if: "!cancelled()"
    runs-on: ${{ matrix.os.runner }}
    strategy:
      matrix:
        os: ${{ fromJson(needs.setup.outputs.matrix).os }}
        chunk: ${{ fromJson(needs.prepare-wopi.outputs.matrix).chunk }}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run tests
        uses: ./.github/actions/puppeteer-run-chunk
        with:
          provider: wopi
